    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Lindcott Armory",
      "url": "https://lindcottarmory.com",
      "description": "Personal firearm management app. Track your gun vault, log range sessions, manage ammo inventory, and analyze shot groups.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Android, Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Lindcott Farms",
        "url": "https://lindcottarmory.com"
      }
    }

    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[SW] Registered');
            // Tell app when an update is waiting
            reg.addEventListener('updatefound', () => {
              const incoming = reg.installing;
              if (!incoming) return;
              incoming.addEventListener('statechange', () => {
                if (incoming.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('sw-update-available'));
                }
              });
            });
          });
          // After skipWaiting, reload once the new SW is controlling the page
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
